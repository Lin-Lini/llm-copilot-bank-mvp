services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d copilot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  kafka:
    image: soldevelo/kafka:3.7
    environment:
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN:-dev-internal-token}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/copilot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-copilot-docs}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      MCP_TOOLS_URL: ${MCP_TOOLS_URL:-http://mcp-tools:8090}
      # LLM + RAG (optional; defaults keep stub mode)
      LLM_PROVIDER: ${LLM_PROVIDER:-stub}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_ANALYZE_MODEL: ${LLM_ANALYZE_MODEL:-}
      LLM_DRAFT_MODEL: ${LLM_DRAFT_MODEL:-}
      LLM_EXPLAIN_MODEL: ${LLM_EXPLAIN_MODEL:-}
      LLM_GHOST_MODEL: ${LLM_GHOST_MODEL:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-800}
      LLM_API_KEY: ${LLM_API_KEY:-}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-stub}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-}
      EMBED_MODEL: ${EMBED_MODEL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8080:8080"

  mcp-tools:
    build:
      context: .
      dockerfile: apps/mcp_tools/Dockerfile
    env_file:
      - .env
    environment:
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN:-dev-internal-token}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "8090:8090"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    environment:
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN:-dev-internal-token}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/copilot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-copilot-docs}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      MCP_TOOLS_URL: ${MCP_TOOLS_URL:-http://mcp-tools:8090}
      # LLM + RAG (optional)
      LLM_PROVIDER: ${LLM_PROVIDER:-stub}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_ANALYZE_MODEL: ${LLM_ANALYZE_MODEL:-}
      LLM_DRAFT_MODEL: ${LLM_DRAFT_MODEL:-}
      LLM_EXPLAIN_MODEL: ${LLM_EXPLAIN_MODEL:-}
      LLM_GHOST_MODEL: ${LLM_GHOST_MODEL:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-800}
      LLM_API_KEY: ${LLM_API_KEY:-}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-stub}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-}
      EMBED_MODEL: ${EMBED_MODEL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
